name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            app/.build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('app/Package.resolved') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Build
        run: swift build

      - name: Unit tests (OpenWhispererKit)
        run: swift run OpenWhispererKitTests

      - name: Hook integration tests
        run: swift run HookTests
